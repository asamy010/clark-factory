<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLARK - ادارة القص والتشغيل</title>
    <link rel="manifest" href="/manifest.json"/>
    <meta name="theme-color" content="#0EA5E9"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <meta name="apple-mobile-web-app-title" content="CLARK"/>
    <link rel="apple-touch-icon" href="/icon-192.png"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Cairo',sans-serif;background:#EFF6FF}
    @media(max-width:768px){table{font-size:12px!important}th,td{padding:6px 8px!important}input,select{font-size:13px!important;padding:8px 10px!important}button{font-size:12px!important}h1{font-size:20px!important}}
    @media(max-width:900px) and (orientation:landscape){#landscape-block{display:flex!important}}
    #landscape-block{display:none;position:fixed;inset:0;background:#1E293B;z-index:999999;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#fff;font-family:'Cairo',sans-serif;text-align:center}
    #landscape-block .icon{font-size:48px;animation:rotatePhone 2s ease infinite}
    @keyframes rotatePhone{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-90deg)}}</style>
  </head>
  <body><div id="landscape-block"><div class="icon">📱</div><div style="font-size:18px;font-weight:700">يرجى تدوير الجهاز</div><div style="font-size:13px;color:#94A3B8">CLARK يعمل في الوضع الرأسي فقط</div></div><div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script type="module" src="/src/main.jsx"></script>
  <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js')})}
  try{screen.orientation&&screen.orientation.lock&&screen.orientation.lock('portrait-primary').catch(()=>{})}catch(e){}</script></body>
</html>
