<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!-- V21.9.155: viewport-fit=cover needed for safe-area-inset-* CSS to work
         (iPhone notch + home indicator). The bottom nav + FAB rely on
         env(safe-area-inset-bottom) for clearance over the home indicator. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CLARK</title>
    <!-- V19.42: removed `description`, `og:description`, and `twitter:description` so that
         link previews in WhatsApp/Telegram/etc. show only the logo + "CLARK" title without
         the marketing paragraph underneath. The user's customer-portal links are functional,
         not promotional, so the description was just noise. The og:image (logo) and og:title
         are kept so the preview still looks branded. -->
    <!-- V17.7+V18.32: Open Graph / Social media link preview (WhatsApp, Telegram, Facebook, etc.)
         Same tags apply to ALL routes (customer portal, workshop portal, main app) since
         we're a SPA — bots only read this static HTML, they don't run JS. -->
    <meta property="og:title" content="CLARK"/>
    <meta property="og:site_name" content="CLARK"/>
    <meta property="og:type" content="website"/>
    <meta property="og:image" content="/icon-512.png"/>
    <meta property="og:image:secure_url" content="/icon-512.png"/>
    <meta property="og:image:width" content="512"/>
    <meta property="og:image:height" content="512"/>
    <meta property="og:image:alt" content="CLARK"/>
    <meta property="og:locale" content="en_US"/>
    <meta property="og:locale:alternate" content="ar_EG"/>
    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:title" content="CLARK"/>
    <meta name="twitter:image" content="/icon-512.png"/>
    <link rel="manifest" href="/manifest.json"/>
    <meta name="theme-color" content="#0EA5E9"/>
    <!-- V19.80.0: paired apple-mobile-web-app-capable + standardized mobile-web-app-capable
         (Chrome deprecated the apple-prefixed one alone; both are needed for full coverage). -->
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <meta name="apple-mobile-web-app-title" content="CLARK Kids Wear"/>
    <link rel="apple-touch-icon" href="/icon-192.png"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Cairo',sans-serif;background:#EFF6FF}
    /* V21.9.158: prevent horizontal scroll on the body/root level on mobile.
       Individual scrollable strips (sub-view chips, tables in cards, etc.) still
       handle their own horizontal scroll via overflow-x:auto on their containers.
       This rule just stops the WHOLE page from drifting left/right when a child
       element accidentally overflows the viewport. */
    @media(max-width:768px){html,body{overflow-x:hidden;max-width:100vw}#root{overflow-x:hidden;max-width:100vw}
    table{font-size:12px!important}th,td{padding:6px 8px!important}input,select{font-size:13px!important;padding:8px 10px!important}button{font-size:12px!important}h1{font-size:20px!important}
      /* V15.10: MetricCard responsive — icon shrinks, value text adjusts so label/value both visible */
      .metric-card{padding:10px 12px!important;gap:8px!important}
      .metric-card > div:first-child{width:32px!important;height:32px!important;font-size:16px!important}
      .metric-card .metric-value{font-size:18px!important}
      .metric-card .metric-label{font-size:11px!important}
      .metric-card .metric-sub{font-size:10px!important}
      /* V15.10: Top-bar action buttons — scroll horizontally on mobile instead of wrapping/cropping */
      .action-row-scroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;flex-wrap:nowrap!important;scrollbar-width:thin}
      .action-row-scroll::-webkit-scrollbar{height:4px}
      .action-row-scroll::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:2px}
      .action-row-scroll > *{flex-shrink:0}
      /* V15.10: Warning cards should not squish vertically — allow full width wrapping */
      .warn-card{flex-direction:column!important;align-items:stretch!important}
    }
    @media(max-width:900px) and (orientation:landscape){#landscape-block{display:flex!important}}
    #landscape-block{display:none;position:fixed;inset:0;background:#1E293B;z-index:999999;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#fff;font-family:'Cairo',sans-serif;text-align:center}
    #landscape-block .icon{font-size:48px;animation:rotatePhone 2s ease infinite}
    @keyframes rotatePhone{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-90deg)}}</style>
  </head>
  <body><div id="landscape-block"><div class="icon">📱</div><div style="font-size:18px;font-weight:700">يرجى تدوير الجهاز</div><div style="font-size:13px;color:#94A3B8">CLARK يعمل في الوضع الرأسي فقط</div></div><div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script type="module" src="/src/main.jsx"></script>
  <!-- V21.9.21: Service Worker registration moved to main.jsx so we can detect
       updates and prompt the user. Inline screen-orientation lock stays here
       for early execution (before React mounts). -->
  <script>try{screen.orientation&&screen.orientation.lock&&screen.orientation.lock('portrait-primary').catch(()=>{})}catch(e){}</script></body>
</html>
