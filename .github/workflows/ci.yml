# ═══════════════════════════════════════════════════════════════════════
# CLARK CI — V21.21.27 (Roadmap Phase 0.2)
# ─────────────────────────────────────────────────────────────────────────
# Runs on every push & PR: install → build → financial test-suite.
# A red run here means the change must NOT reach production.
# (Vercel deploys independently on push to main — this workflow is the
#  early-warning gate; branch-protection enforcement comes later.)
# ═══════════════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (error-level rules only — V21.21.39)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run financial test-suite
        run: npm test

  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # V21.9.69 lesson: Firestore rules had no test env, so a syntax-valid
      # rule broke every write in production. This job runs the rules test
      # suite against the local emulator on every push — no production touch.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Run Firestore rules test-suite (emulator)
        run: npm run test:rules
